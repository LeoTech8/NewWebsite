<body>

<div class="gamble-wrapper">

    <br>
<label for="paid">How much do you get paid per year</label>

<select name="paid" id="paid">

<br>

<br>
<select name="grass" id="grass">
  <option value="">--Please choose an option--</option>
  <option value="man">Yes</option>
  <option value="woman">No</option>
</select>
<br>
<label for="marred">Are you married to your couch</label>
<br>
<select name="marred" id="marred">

    <button onclick="findOut()">Find Out!</button>
    <button><a href="index.html">Back</a></button>
    </a>

</div>

</div>

</body>
<script>
function findOut() {
    // 1. Move this inside the function so it updates on click
    const paidAmt = document.getElementById('paid').value;
    const marred = document.getElementById('marred').value;

    // 2. Use === to check the value instead of assigning it
    if (paidAmt === 'none') {
        alert("You are jobless!");
    } 
    if (marred === 'man') {
        alert("You are jobless!");
    }
    else {
        alert("You not jobless!");
    }
} // <--- 3. Added the missing closing bracket here
</script>
